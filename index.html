<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXORA Tycoon</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="particles"></div>

<div class="backgroundGlow"></div>

<div class="app">

<header>

<div class="logo">
💎 NEXORA TYCOON
</div>

<div class="levelBox">

<div class="levelTop">

<span id="level">
LVL 1
</span>

<span id="xpText">
0 / 100 XP
</span>

</div>

<div class="xpBar">

<div id="xpFill"></div>

</div>

</div>

</header>

<section class="moneyCard">

<div class="moneyTitle">
Balance
</div>

<div class="money">
$<span id="money">0</span>
</div>

<div class="income">
+$<span id="income">1</span>/sec
</div>

</section>

<section class="launch">

<button id="launchButton">
🚀 Launch Offer
</button>

<div id="floatingContainer"></div>

</section>

<section class="menu">

<button id="shopButton" class="menuButton">
🛒 Shop
</button>

<button id="staffButton" class="menuButton">
👥 Staff
</button>

<button id="countriesButton" class="menuButton">
🌍 Countries
</button>

<button id="achievementsButton" class="menuButton">
🏆 Achievements
</button>

<button id="statisticsButton" class="menuButton">
📊 Statistics
</button>

<button id="settingsButton" class="menuButton">
⚙ Settings
</button>

</section>

<footer>

NEXORA Tycoon Alpha v2

</footer>

</div>

<!-- SHOP -->

<div id="shopModal" class="modal hidden">

<div class="modal-content">

<h2>🛒 Shop</h2>

<div id="shopItems">

<p>Shop is under construction...</p>

</div>

<button id="closeShop">
Close
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
